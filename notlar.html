<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halil Esen | Notlar & Chat</title>
    <style>
        :root {
            --bg: #090d17; --surface: #121a29; --surface-2: #162235;
            --text: #e5edf7; --muted: #9fb0c9; --line: #27364f;
            --blue: #3b82f6; --cyan: #22d3ee;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif; color: var(--text);
            background: radial-gradient(circle at 12% 10%, rgba(59, 130, 246, 0.15), transparent 30%), var(--bg);
            min-height: 100vh;
        }
        .container { width: min(1100px, 92%); margin: 0 auto; }
        .nav-wrap { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px); background: rgba(9, 13, 23, 0.86); border-bottom: 1px solid var(--line); }
        nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; }
        .menu { display: flex; gap: 10px; }
        .menu a { text-decoration: none; color: var(--text); padding: 8px 12px; border-radius: 999px; font-size: 0.95rem; border: 1px solid transparent; }
        .menu a.active { border-color: var(--line); background: rgba(22, 34, 53, 0.8); }
        
        main { padding: 2.5rem 0; }
        .hero { border: 1px solid var(--line); border-radius: 16px; padding: 1.5rem; background: linear-gradient(135deg, rgba(18, 26, 41, 0.95), rgba(10, 19, 34, 0.92)); margin-bottom: 2rem; }
        .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; min-height: 500px; }
        
        /* Chat Style */
        #chat-box { flex-grow: 1; overflow-y: auto; border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 10px; }
        .msg { background: var(--surface-2); padding: 10px; border-radius: 8px; border-left: 3px solid var(--blue); animation: fadeIn 0.3s ease; }
        .msg b { color: var(--cyan); display: block; font-size: 0.75rem; margin-bottom: 4px; }
        .chat-input-row { display: flex; gap: 8px; margin-top: 10px; }
        input { background: var(--bg); border: 1px solid var(--line); color: white; padding: 10px; border-radius: 6px; outline: none; }
        button { background: var(--blue); color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #2563eb; }
        
        .admin-zone { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); display: flex; gap: 5px; align-items: center; }
        .admin-zone input { padding: 5px; font-size: 0.8rem; width: 80px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 900px) { .panel-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="nav-wrap">
        <nav class="container">
            <div style="font-weight:700;">HE | Portfolio</div>
            <div class="menu">
                <a href="index.html">Ana Sayfa</a>
                <a href="projeler.html">Projeler</a>
                <a class="active" href="notlar.html">Notlar</a>
            </div>
        </nav>
    </div>

    <main class="container">
        <section class="hero">
            <h1>Notlar ve Mühendislik Odası</h1>
            <p>Akademik arşivini yönet ve toplulukla anlık iletişime geç.</p>
        </section>

        <div class="panel-grid">
            <section class="panel">
                <div style="display:flex; justify-content: space-between; align-items: center;">
                    <h2>Akademik Arşiv</h2>
                    <a href="https://drive.google.com/drive/folders/1nOaLwK8ws5KhppWYdoOpH9v_KpPAPnxP" target="_blank" style="color:var(--cyan); text-decoration:none; font-size:0.85rem; font-weight:bold;">+ Dosya Yükle</a>
                </div>
                <iframe src="https://drive.google.com/embeddedfolderview?id=1nOaLwK8ws5KhppWYdoOpH9v_KpPAPnxP#list" width="100%" height="400" frameborder="0" style="border-radius:8px; background:white;"></iframe>
            </section>

            <section class="panel">
                <h2>Mühendislik Odası (Online)</h2>
                <div id="chat-box"></div>
                <div class="chat-input-row">
                    <input type="text" id="userName" placeholder="İsim" style="width: 80px;">
                    <input type="text" id="userMsg" placeholder="Mesaj yazın..." style="flex:1;">
                    <button onclick="sendMessage()">Gönder</button>
                </div>
                
                <div class="admin-zone">
                    <span style="font-size: 0.7rem; color: var(--muted);">Yönetici:</span>
                    <input type="password" id="adminPin" placeholder="PIN">
                    <button onclick="clearChat()" style="background: var(--red); padding: 5px 10px; font-size: 0.7rem;">Sohbeti Temizle</button>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Halil, senin Firebase anahtarların buraya monte edildi!
        const firebaseConfig = {
            apiKey: "AIzaSyAyZvSrh877ifV0-pCarXQyEccefGClTl8",
            authDomain: "halilesenncom.firebaseapp.com",
            projectId: "halilesenncom",
            storageBucket: "halilesenncom.firebasestorage.app",
            messagingSenderId: "641056321772",
            appId: "1:641056321772:web:bb29cda5742632061775c9",
            databaseURL: "https://halilesenncom-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");

        // Mesaj Gönderme Fonksiyonu
        window.sendMessage = () => {
            const name = document.getElementById("userName").value.trim() || "Misafir";
            const msg = document.getElementById("userMsg").value.trim();
            if (msg) {
                push(chatRef, { name: name, text: msg, time: Date.now() });
                document.getElementById("userMsg").value = "";
                localStorage.setItem("he_chat_name", name); // İsmi hatırla
            }
        };

        // Sayfa açıldığında ismi hatırla
        document.getElementById("userName").value = localStorage.getItem("he_chat_name") || "";

        // Mesajları Dinleme (Gerçek Zamanlı)
        onChildAdded(chatRef, (snapshot) => {
            const data = snapshot.val();
            const chatBox = document.getElementById("chat-box");
            const msgDiv = document.createElement("div");
            msgDiv.className = "msg";
            msgDiv.innerHTML = `<b>${data.name}</b> ${data.text}`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // Sohbeti Temizleme (Yönetici)
        window.clearChat = () => {
            const pin = document.getElementById("adminPin").value;
            if (pin === "HE2026") {
                if(confirm("Tüm sohbet geçmişi silinecek. Emin misin?")) {
                    remove(chatRef);
                    location.reload();
                }
            } else {
                alert("Hatalı PIN!");
            }
        };

        // Enter tuşu desteği
        document.getElementById("userMsg").addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
