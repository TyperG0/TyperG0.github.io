<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteor Dash Arena</title>
    <style>
        :root {
            --bg: #020617;
            --panel: #0b1224;
            --ink: #e2e8f0;
            --muted: #94a3b8;
            --accent: #f59e0b;
            --good: #22c55e;
            --danger: #ef4444;
            --line: #1e293b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 15% 15%, #1d4ed8 0%, transparent 28%),
                radial-gradient(circle at 80% 10%, #0f766e 0%, transparent 24%),
                radial-gradient(circle at 60% 80%, #7c2d12 0%, transparent 20%),
                var(--bg);
            color: var(--ink);
            font-family: 'Trebuchet MS', 'Segoe UI', Tahoma, sans-serif;
            display: grid;
            place-items: center;
            padding: 18px;
        }

        .layout {
            width: min(1100px, 100%);
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 16px;
        }

        .panel {
            background: linear-gradient(160deg, rgba(11, 18, 36, 0.96), rgba(15, 23, 42, 0.94));
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 14px 35px rgba(2, 6, 23, 0.45);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 1.35rem;
            letter-spacing: 0.4px;
        }

        .subtitle {
            margin: 0 0 14px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #162238;
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.7);
        }

        .stat label {
            color: var(--muted);
            font-size: 0.88rem;
        }

        .stat strong {
            font-size: 1.1rem;
        }

        .controls {
            margin-top: 12px;
            display: grid;
            gap: 10px;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 11px 12px;
            font-weight: 700;
            cursor: pointer;
            color: #0f172a;
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 8px 16px rgba(245, 158, 11, 0.35);
        }

        button:hover {
            transform: translateY(-1px);
        }

        button.secondary {
            background: linear-gradient(90deg, #22d3ee, #38bdf8);
            box-shadow: 0 8px 16px rgba(34, 211, 238, 0.3);
        }

        .tips {
            margin-top: 12px;
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .game-wrap {
            background: rgba(11, 18, 36, 0.9);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 10px;
            box-shadow: 0 14px 35px rgba(2, 6, 23, 0.45);
            position: relative;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            border-radius: 10px;
            display: block;
            background: linear-gradient(180deg, #020617, #0b1224 45%, #1e293b);
        }

        .overlay {
            position: absolute;
            inset: 10px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            background: rgba(2, 6, 23, 0.55);
            text-align: center;
            padding: 16px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .overlay.visible {
            opacity: 1;
        }

        .overlay h2 {
            margin: 0 0 8px;
            font-size: 1.6rem;
        }

        .overlay p {
            margin: 0;
            color: #cbd5e1;
        }

        .mobile-controls {
            margin-top: 10px;
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .mobile-controls button {
            padding: 12px;
        }

        @media (max-width: 920px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .mobile-controls {
                display: grid;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="panel">
            <h1>Meteor Dash Arena</h1>
            <p class="subtitle">Enerji topla, meteorlerden kac, kombolarla skoru katla.</p>

            <div class="stat"><label>Skor</label><strong id="score">0</strong></div>
            <div class="stat"><label>Sure</label><strong id="time">60</strong></div>
            <div class="stat"><label>Can</label><strong id="hp">3</strong></div>
            <div class="stat"><label>Seviye</label><strong id="level">1</strong></div>
            <div class="stat"><label>Rekor</label><strong id="best">0</strong></div>

            <div class="controls">
                <button id="startBtn">Baslat / Tekrar Oyna</button>
                <button class="secondary" id="pauseBtn">Duraklat</button>
            </div>

            <div class="tips">
                Kontrol: W/S veya Yukari/Asagi oklari<br>
                Mobil: Asagi ve Yukari butonlari<br>
                Kural: Kirmizi meteor hasar verir, mavi kupler puan kazandirir.
            </div>
        </aside>

        <section class="game-wrap">
            <canvas id="arena" width="960" height="540" aria-label="Meteor Dash Arena"></canvas>
            <div id="overlay" class="overlay visible">
                <div>
                    <h2>Hazir misin?</h2>
                    <p>Baslat butonuna tikla ve 60 saniye hayatta kal.</p>
                </div>
            </div>
            <div class="mobile-controls">
                <button id="upBtn">Yukari</button>
                <button id="downBtn">Asagi</button>
            </div>
        </section>
    </div>

    <script>
        const canvas = document.getElementById('arena');
        const ctx = canvas.getContext('2d');

        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const hpEl = document.getElementById('hp');
        const levelEl = document.getElementById('level');
        const bestEl = document.getElementById('best');
        const overlay = document.getElementById('overlay');

        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const upBtn = document.getElementById('upBtn');
        const downBtn = document.getElementById('downBtn');

        const STAR_COUNT = 60;
        let stars = [];

        let game = null;
        let keys = { up: false, down: false };
        let animationId = null;
        let lastTime = 0;

        function createStars() {
            stars = Array.from({ length: STAR_COUNT }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.8 + 0.4,
                speed: Math.random() * 0.35 + 0.1,
            }));
        }

        function resetGame() {
            game = {
                running: true,
                paused: false,
                score: 0,
                hp: 3,
                time: 60,
                elapsed: 0,
                spawnTimer: 0,
                orbTimer: 0,
                combo: 1,
                comboTimer: 0,
                level: 1,
                player: {
                    x: 90,
                    y: canvas.height / 2,
                    width: 52,
                    height: 28,
                    speed: 320,
                    blink: 0,
                },
                meteors: [],
                orbs: [],
            };

            scoreEl.textContent = '0';
            timeEl.textContent = String(game.time);
            hpEl.textContent = String(game.hp);
            levelEl.textContent = '1';
            overlay.classList.remove('visible');
            pauseBtn.textContent = 'Duraklat';
        }

        function getBestScore() {
            return Number(localStorage.getItem('meteorDashBest') || 0);
        }

        function setBestScore(value) {
            localStorage.setItem('meteorDashBest', String(value));
            bestEl.textContent = String(value);
        }

        function spawnMeteor(level) {
            const radius = Math.random() * 18 + 14;
            const speed = Math.random() * 140 + 210 + level * 22;
            game.meteors.push({
                x: canvas.width + radius,
                y: Math.random() * (canvas.height - radius * 2) + radius,
                r: radius,
                speed,
                spin: Math.random() * Math.PI,
            });
        }

        function spawnOrb(level) {
            const size = 16;
            game.orbs.push({
                x: canvas.width + size,
                y: Math.random() * (canvas.height - size * 2) + size,
                s: size,
                speed: 240 + level * 18,
                pulse: Math.random() * Math.PI,
            });
        }

        function collisionCircleRect(circle, rect) {
            const testX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
            const testY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));
            const dx = circle.x - testX;
            const dy = circle.y - testY;
            return dx * dx + dy * dy <= circle.r * circle.r;
        }

        function collisionSquareRect(square, rect) {
            return !(
                square.x + square.s < rect.x ||
                square.x - square.s > rect.x + rect.width ||
                square.y + square.s < rect.y ||
                square.y - square.s > rect.y + rect.height
            );
        }

        function drawStars(dt) {
            for (const star of stars) {
                star.x -= star.speed * dt * 60;
                if (star.x < -2) {
                    star.x = canvas.width + 2;
                    star.y = Math.random() * canvas.height;
                }
                ctx.fillStyle = '#93c5fd';
                ctx.fillRect(star.x, star.y, star.size, star.size);
            }
        }

        function drawPlayer(player) {
            const alpha = player.blink > 0 ? 0.45 : 1;
            ctx.save();
            ctx.globalAlpha = alpha;
            const x = player.x;
            const y = player.y;

            ctx.fillStyle = '#38bdf8';
            ctx.beginPath();
            ctx.moveTo(x, y + player.height / 2);
            ctx.lineTo(x + player.width, y);
            ctx.lineTo(x + player.width, y + player.height);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(x + 12, y + 8, 14, 4);
            ctx.fillRect(x + 12, y + 16, 18, 4);

            ctx.fillStyle = '#f97316';
            ctx.beginPath();
            ctx.moveTo(x - 8, y + player.height / 2);
            ctx.lineTo(x + 4, y + player.height / 2 - 6);
            ctx.lineTo(x + 4, y + player.height / 2 + 6);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function drawMeteor(meteor) {
            ctx.save();
            ctx.translate(meteor.x, meteor.y);
            ctx.rotate(meteor.spin);
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            for (let i = 0; i < 10; i += 1) {
                const angle = (Math.PI * 2 * i) / 10;
                const radius = i % 2 === 0 ? meteor.r : meteor.r * 0.75;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawOrb(orb) {
            const pulse = Math.sin(orb.pulse) * 2.2;
            ctx.fillStyle = '#22d3ee';
            ctx.beginPath();
            ctx.roundRect(orb.x - orb.s + pulse / 2, orb.y - orb.s + pulse / 2, orb.s * 2 - pulse, orb.s * 2 - pulse, 4);
            ctx.fill();
        }

        function update(dt) {
            if (!game || !game.running || game.paused) return;

            game.elapsed += dt;
            game.time = Math.max(0, 60 - Math.floor(game.elapsed));
            game.level = 1 + Math.floor(game.elapsed / 15);
            game.comboTimer = Math.max(0, game.comboTimer - dt);

            if (game.comboTimer === 0) {
                game.combo = 1;
            }

            const player = game.player;
            if (keys.up) player.y -= player.speed * dt;
            if (keys.down) player.y += player.speed * dt;
            player.y = Math.max(8, Math.min(canvas.height - player.height - 8, player.y));
            player.blink = Math.max(0, player.blink - dt);

            game.spawnTimer += dt;
            game.orbTimer += dt;

            const meteorInterval = Math.max(0.24, 0.7 - game.level * 0.05);
            const orbInterval = Math.max(0.45, 1.2 - game.level * 0.07);

            if (game.spawnTimer >= meteorInterval) {
                game.spawnTimer = 0;
                spawnMeteor(game.level);
            }

            if (game.orbTimer >= orbInterval) {
                game.orbTimer = 0;
                spawnOrb(game.level);
            }

            for (let i = game.meteors.length - 1; i >= 0; i -= 1) {
                const meteor = game.meteors[i];
                meteor.x -= meteor.speed * dt;
                meteor.spin += dt * 2;

                if (meteor.x < -meteor.r - 20) {
                    game.meteors.splice(i, 1);
                    continue;
                }

                if (collisionCircleRect(meteor, player)) {
                    game.meteors.splice(i, 1);
                    game.hp -= 1;
                    player.blink = 0.35;
                    game.combo = 1;
                    game.comboTimer = 0;
                    if (game.hp <= 0) {
                        endGame('Hasar cok yuksek! Gemi dustu.');
                        return;
                    }
                }
            }

            for (let i = game.orbs.length - 1; i >= 0; i -= 1) {
                const orb = game.orbs[i];
                orb.x -= orb.speed * dt;
                orb.pulse += dt * 8;

                if (orb.x < -40) {
                    game.orbs.splice(i, 1);
                    continue;
                }

                if (collisionSquareRect(orb, player)) {
                    game.orbs.splice(i, 1);
                    game.score += 8 * game.combo;
                    game.combo = Math.min(6, game.combo + 1);
                    game.comboTimer = 1.8;
                }
            }

            if (game.time <= 0) {
                endGame('Sure tamamlandi! Harika kacis.');
            }

            scoreEl.textContent = String(game.score);
            timeEl.textContent = String(game.time);
            hpEl.textContent = String(game.hp);
            levelEl.textContent = String(game.level);
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#020617');
            gradient.addColorStop(1, '#172554');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawStars(1 / 60);

            if (game) {
                for (const orb of game.orbs) drawOrb(orb);
                for (const meteor of game.meteors) drawMeteor(meteor);
                drawPlayer(game.player);

                ctx.fillStyle = '#f8fafc';
                ctx.font = 'bold 18px Trebuchet MS';
                ctx.fillText('Combo x' + game.combo, 24, 36);
            }
        }

        function endGame(message) {
            game.running = false;
            const best = getBestScore();
            if (game.score > best) {
                setBestScore(game.score);
            }

            overlay.innerHTML =
                '<div><h2>Oyun Bitti</h2><p>' +
                message +
                '<br>Skor: ' +
                game.score +
                ' | Rekor: ' +
                Math.max(game.score, best) +
                '</p></div>';
            overlay.classList.add('visible');
        }

        function tick(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const dt = Math.min((timestamp - lastTime) / 1000, 0.04);
            lastTime = timestamp;

            update(dt);
            render();
            animationId = requestAnimationFrame(tick);
        }

        function setUpControls() {
            document.addEventListener('keydown', (event) => {
                if (event.key === 'ArrowUp' || event.key.toLowerCase() === 'w') keys.up = true;
                if (event.key === 'ArrowDown' || event.key.toLowerCase() === 's') keys.down = true;
            });

            document.addEventListener('keyup', (event) => {
                if (event.key === 'ArrowUp' || event.key.toLowerCase() === 'w') keys.up = false;
                if (event.key === 'ArrowDown' || event.key.toLowerCase() === 's') keys.down = false;
            });

            const bindTouch = (element, type, state) => {
                element.addEventListener(type, (event) => {
                    event.preventDefault();
                    keys[state] = type === 'touchstart' || type === 'mousedown';
                }, { passive: false });
            };

            for (const [button, state] of [[upBtn, 'up'], [downBtn, 'down']]) {
                bindTouch(button, 'touchstart', state);
                bindTouch(button, 'touchend', state);
                bindTouch(button, 'mousedown', state);
                bindTouch(button, 'mouseup', state);
                bindTouch(button, 'mouseleave', state);
            }
        }

        startBtn.addEventListener('click', () => {
            resetGame();
        });

        pauseBtn.addEventListener('click', () => {
            if (!game || !game.running) return;
            game.paused = !game.paused;
            pauseBtn.textContent = game.paused ? 'Devam Et' : 'Duraklat';
            overlay.classList.toggle('visible', game.paused);
            if (game.paused) {
                overlay.innerHTML = '<div><h2>Duraklatildi</h2><p>Devam etmek icin tekrar tikla.</p></div>';
            }
        });

        window.addEventListener('blur', () => {
            if (game && game.running && !game.paused) {
                game.paused = true;
                pauseBtn.textContent = 'Devam Et';
                overlay.innerHTML = '<div><h2>Duraklatildi</h2><p>Pencere odaqi degistigi icin oyun durdu.</p></div>';
                overlay.classList.add('visible');
            }
        });

        function init() {
            bestEl.textContent = String(getBestScore());
            createStars();
            setUpControls();
            render();
            animationId = requestAnimationFrame(tick);
        }

        init();

        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
        });
    </script>
</body>
</html>
